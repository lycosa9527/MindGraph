<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MindGraph</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="accent-bar" aria-hidden="true"></div>
    <nav class="popup-tabs" role="tablist" aria-label="MindGraph">
      <button
        type="button"
        id="tab-generate"
        class="popup-tab is-active"
        role="tab"
        aria-selected="true"
        aria-controls="generate-view"
        data-i18n="tabGenerate"
      ></button>
      <button
        type="button"
        id="tab-mindmate"
        class="popup-tab"
        role="tab"
        aria-selected="false"
        aria-controls="mindmate-view"
        data-i18n="tabMindmate"
      ></button>
      <button
        type="button"
        id="tab-download"
        class="popup-tab"
        role="tab"
        aria-selected="false"
        aria-controls="download-view"
        data-i18n="tabDownload"
      ></button>
      <button
        type="button"
        id="tab-settings"
        class="popup-tab"
        role="tab"
        aria-selected="false"
        aria-controls="settings-view"
        data-i18n="tabSettings"
      ></button>
    </nav>
    <div id="generate-view" class="panel" role="tabpanel">
      <header class="panel-head panel-head-with-close">
        <div class="panel-head-titles">
          <h1 class="title" data-i18n="appTitle"></h1>
          <p class="lead" data-i18n="mainTagline"></p>
        </div>
        <button
          type="button"
          id="btn-close-main"
          class="btn-icon-close"
          data-i18n-aria-label="btnClose"
        >
          <span class="btn-icon-close-glyph" aria-hidden="true">×</span>
        </button>
      </header>
      <div class="actions">
        <button type="button" id="btn-generate" class="btn btn-primary" data-i18n="btnGenerate"></button>
      </div>
      <div id="file-center-section" class="file-center-section">
        <p class="eyebrow field-section-label" data-i18n="fileCenterSectionLabel"></p>
        <label class="field">
          <span class="field-label" data-i18n="fileCenterPackageLabel"></span>
          <select id="field-package" class="field-select"></select>
        </label>
        <button
          type="button"
          id="btn-save-file-center"
          class="btn btn-secondary"
          data-i18n="btnSaveToFileCenter"
        ></button>
      </div>
      <div class="main-status-area">
        <div id="progress-wrap" class="progress-wrap" hidden>
          <div class="progress-track" aria-hidden="true">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
          <p id="progress-stage" class="progress-stage"></p>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
        <a
          id="link-view-diagram"
          class="link-view-diagram"
          href="#"
          rel="noopener noreferrer"
          data-i18n="linkViewInLibrary"
          hidden
        ></a>
        <p id="library-full-note" class="library-full-note" aria-live="polite" hidden></p>
      </div>
    </div>
    <div id="mindmate-view" class="panel" role="tabpanel" hidden>
      <header class="panel-head panel-head-with-close">
        <div class="panel-head-titles">
          <h1 class="title title-sm" data-i18n="mindmateTitle"></h1>
        </div>
        <button
          type="button"
          id="btn-close-mindmate"
          class="btn-icon-close"
          data-i18n-aria-label="btnClose"
        >
          <span class="btn-icon-close-glyph" aria-hidden="true">×</span>
        </button>
      </header>
      <div id="mindmate-setup-hint" class="mindmate-setup-hint">
        <p class="field-hint" data-i18n="mindmateSetupHint"></p>
        <button type="button" id="btn-mindmate-go-settings" class="btn btn-secondary" data-i18n="mindmateGoSettings"></button>
      </div>
      <div id="mindmate-chat-wrap" class="mindmate-chat-wrap" hidden>
        <div class="mindmate-toolbar">
          <button type="button" id="btn-mindmate-new" class="btn btn-secondary btn-compact" data-i18n="btnMindmateNew"></button>
          <a
            id="link-mindmate-web"
            class="mindmate-web-link"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="linkMindmateWeb"
          ></a>
        </div>
        <div id="mindmate-messages" class="mindmate-messages" role="log" aria-live="polite"></div>
        <div class="mindmate-composer">
          <textarea
            id="mindmate-input"
            class="mindmate-input"
            rows="2"
            data-i18n-placeholder="mindmateInputPlaceholder"
          ></textarea>
          <div class="mindmate-composer-actions">
            <label class="mindmate-include-page" for="mindmate-include-page">
              <input type="checkbox" id="mindmate-include-page" checked />
              <span data-i18n="mindmateIncludePage"></span>
            </label>
            <div class="mindmate-composer-buttons">
              <button type="button" id="btn-mindmate-stop" class="btn btn-secondary" data-i18n="btnMindmateStop" hidden></button>
              <button type="button" id="btn-mindmate-send" class="btn btn-primary" data-i18n="btnMindmateSend"></button>
            </div>
          </div>
          <p
            id="mindmate-page-context-notice"
            class="mindmate-page-context-notice"
            hidden
            aria-live="polite"
          ></p>
        </div>
        <p id="mindmate-status" class="status" aria-live="polite"></p>
      </div>
    </div>
    <div id="download-view" class="panel" role="tabpanel" hidden>
      <header class="panel-head panel-head-with-close">
        <div class="panel-head-titles">
          <h1 class="title title-sm" data-i18n="downloadTitle"></h1>
          <p class="lead" data-i18n="downloadTagline"></p>
        </div>
        <button
          type="button"
          id="btn-close-download"
          class="btn-icon-close"
          data-i18n-aria-label="btnClose"
        >
          <span class="btn-icon-close-glyph" aria-hidden="true">×</span>
        </button>
      </header>
      <div id="download-unsupported" class="download-empty" hidden>
        <p class="field-hint" data-i18n="downloadUnsupportedPage"></p>
      </div>
      <div id="doc-extract-section" class="file-center-section" hidden>
        <p class="eyebrow field-section-label" data-i18n="docExtractSectionLabel"></p>
        <p id="doc-extract-detected" class="field-hint"></p>
        <p id="doc-extract-active-tab" class="field-hint"></p>
        <p id="doc-extract-title" class="field-hint"></p>
        <p id="doc-extract-pages" class="field-hint" hidden></p>
        <div id="smartedu-extract-panel" hidden>
          <p id="smartedu-token-status" class="field-hint"></p>
          <div class="smartedu-token-actions">
            <button type="button" id="btn-sync-smartedu-token" class="btn btn-secondary btn-compact" data-i18n="btnSyncSmartEduToken"></button>
            <button type="button" id="btn-paste-smartedu-token" class="btn btn-secondary btn-compact btn-subtle" data-i18n="btnPasteSmartEduToken"></button>
          </div>
          <div id="smartedu-asset-list" class="smartedu-asset-list"></div>
        </div>
        <button
          type="button"
          id="btn-extract-document"
          class="btn btn-primary"
          data-i18n="btnExtractDocument"
        ></button>
      </div>
      <div class="main-status-area">
        <div id="download-progress-wrap" class="progress-wrap" hidden>
          <div class="progress-track" aria-hidden="true">
            <div id="download-progress-fill" class="progress-fill"></div>
          </div>
          <p id="download-progress-stage" class="progress-stage"></p>
        </div>
        <p id="download-status" class="status" aria-live="polite"></p>
      </div>
    </div>
    <div id="settings-view" class="panel" hidden>
      <header class="panel-head panel-head-with-close">
        <div class="panel-head-titles">
          <p class="eyebrow" data-i18n="settingsEyebrow"></p>
          <h1 class="title title-sm" data-i18n="settingsTitle"></h1>
          <p class="lead" data-i18n="settingsLead"></p>
        </div>
        <button
          type="button"
          id="btn-close-settings"
          class="btn-icon-close"
          data-i18n-aria-label="btnClose"
        >
          <span class="btn-icon-close-glyph" aria-hidden="true">×</span>
        </button>
      </header>
      <div class="fields">
        <label class="field">
          <span class="field-label" data-i18n="labelBaseUrl"></span>
          <select id="field-base-url" class="field-select"></select>
          <p id="field-local-server-warning" class="field-hint field-hint-warn" hidden data-i18n="localServerHttpWarning"></p>
        </label>
        <label class="field">
          <span class="field-label" data-i18n="labelAccount"></span>
          <input type="text" id="field-account" data-i18n-placeholder="placeholderAccount" autocomplete="off" />
        </label>
        <label class="field">
          <span class="field-label" data-i18n="labelToken"></span>
          <input type="password" id="field-token" data-i18n-placeholder="placeholderToken" autocomplete="off" />
          <p id="field-token-expires" class="field-hint" aria-live="polite"></p>
        </label>
        <label class="field">
          <span class="field-label" data-i18n="labelUiLanguage"></span>
          <select id="field-ui-language" class="field-select"></select>
        </label>
        <p class="eyebrow field-section-label" data-i18n="settingsAdvanced"></p>
        <div class="field-dimensions">
          <label class="field field-dim-part">
            <span class="field-label" data-i18n="labelPngWidth"></span>
            <input
              type="number"
              id="field-png-width"
              min="400"
              max="4000"
              step="1"
              data-i18n-placeholder="placeholderPngSize"
              autocomplete="off"
            />
          </label>
          <label class="field field-dim-part">
            <span class="field-label" data-i18n="labelPngHeight"></span>
            <input
              type="number"
              id="field-png-height"
              min="300"
              max="3000"
              step="1"
              data-i18n-placeholder="placeholderPngSize"
              autocomplete="off"
            />
          </label>
        </div>
        <label class="field-row-checkbox" for="field-save-as">
          <input type="checkbox" id="field-save-as" />
          <span class="field-row-label" data-i18n="labelSaveAs"></span>
        </label>
      </div>
      <div class="actions">
        <button type="button" id="btn-save" class="btn btn-primary" data-i18n="btnSave"></button>
      </div>
      <div class="settings-status-area">
        <p id="settings-status" class="status" aria-live="polite"></p>
      </div>
    </div>
    <script src="shared-mindgraph.js"></script>
    <script src="extension-storage.js"></script>
    <script src="mindmate-sse.js"></script>
    <script src="mindmate-api.js"></script>
    <script src="mindmate-compose.js"></script>
    <script src="mindmate-markdown.js"></script>
    <script src="mindmate-capture-debug.js"></script>
    <script src="mindmate-capture-progress.js"></script>
    <script src="mindmate-session.js"></script>
    <script src="mindmate-panel.js"></script>
    <script src="popup.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Pixel Battle Preview</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #05050c;
        overflow: hidden;
        font-family: ui-monospace, monospace;
      }
      canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      .overlay {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 2;
        color: #e7e5e4;
        font-size: 12px;
        line-height: 1.5;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px 10px;
        border-radius: 6px;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="battle" aria-hidden="true"></canvas>
    <div class="overlay">
      Black cat vs Ultraman — 32s fight loop<br />
      Phases: standoff → rush → melee → knockback → beam war → leap → finale
    </div>
    <script type="module">
      import { initAuthPixelBattle } from '/src/utils/mascot/authPixelBattle.ts'
      const canvas = document.getElementById('battle')
      initAuthPixelBattle(canvas, { showHud: true })
    </script>
  </body>
</html>

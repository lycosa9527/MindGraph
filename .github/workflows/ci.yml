# MindGraph CI — lint + targeted tests (expand as the repo grows).
name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install system deps (QR bind)
        run: sudo apt-get update && sudo apt-get install -y libzbar0
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff (lint + format)
        run: |
          ruff check .
          ruff format --check .
      - name: No inline lint suppressions
        run: python scripts/lint/lint_no_inline_disables.py
      - name: RLS session and dependency-order guards
        run: |
          python scripts/lint/lint_rls_session.py
          python scripts/lint/lint_rls_dep_order.py
          python scripts/lint/lint_admin_panel_access.py
      - name: Redis async connection options guard
        run: python scripts/lint/lint_redis_connection_options.py
      - name: Pylint four-rule audit (AST baseline)
        run: python scripts/lint/audit_pylint_four_rules.py --fail
      - name: basedpyright (strict; see pyproject.toml)
        run: python -m basedpyright .
      - name: App import smoke
        run: python -c "from main import app; assert app.title"
      - name: Pylint (full Python tree; minimal policy disables)
        run: |
          pylint services routers agents clients config utils scripts tests loadtests tasks alembic/env.py \
            --fail-under=10.0
      - name: Pytest (focused + collab)
        run: |
          pytest -q tests/test_redis_connection_options.py \
            tests/test_collab_ws_json_limits.py tests/test_workshop_update_flush_gate.py \
            tests/test_workshop_ws_integration.py tests/test_online_collab_phase8.py \
            tests/test_workshop_collab_backend.py tests/test_collab_palette_sync.py \
            tests/test_workshop_editor_redis_merge.py tests/test_ws_fanout.py \
            tests/test_collab_synthetic_probe.py tests/test_workshop_join_resume_tokens.py \
            tests/test_organization_mindmate_avatar.py tests/test_org_subscription.py \
            tests/test_school_tier.py tests/test_dify_user_key.py \
            tests/test_mindbot_bind_messages.py tests/test_dingtalk_bind_imports.py \
            tests/test_mindbot_pair_code_handler.py tests/test_bind_code_parse.py \
            tests/test_generate_dingtalk_identity.py tests/test_library_save_user_notices.py \
            tests/test_generation_skip_registry.py tests/test_mindbot_library_save_reply.py \
            tests/test_user_daily_token_quota.py tests/test_llm_daily_token_cap.py \
            tests/test_get_client_ip.py tests/test_gewe_webhook_auth.py \
            tests/test_refresh_token_reuse.py tests/test_security_production_hardening.py \
            tests/test_csrf_protection.py \
            tests/test_workshop_chat_file_service.py tests/test_dingtalk_bind_service.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: VueUse PURE annotations (Rolldown build hygiene)
        run: npm run check:vueuse-pure
      - name: DEP0205 regression (Node module hooks)
        run: npm run check:dep0205
      - name: CLI script smoke (native Node type stripping)
        run: npm run check:scripts
      - name: npm audit (high severity)
        run: npm audit --audit-level=high
      - name: Vitest (workshop reconnect + diagram meta)
        run: npx vitest run tests/useWorkshopReconnect.spec.ts tests/mindmateDiagramMeta.spec.ts

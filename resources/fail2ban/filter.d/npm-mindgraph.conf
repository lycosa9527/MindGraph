# MindGraph + Nginx Proxy Manager access log (combined-style).
# Tighten failregex after validating with: fail2ban-regex /path/to/proxy-host-_access.log filter.d/npm-mindgraph.conf

[Definition]
failregex = ^<HOST> -.*"(?:GET|POST|HEAD|PUT|DELETE|PATCH|OPTIONS)\s+\S+\s+HTTP\/[\d.]+"\s+(401|429)\s
ignoreregex =

# On ban: report IP to AbuseIPDB using MindGraph CLI module.
#
# Before enabling:
# 1. Replace /CHANGE/ME/MindGraph below with your MindGraph repo root (absolute path).
# 2. Ensure /etc/fail2ban/abuseipdb.conf exists with: KEY=your_abuseipdb_api_key
# 3. Test: cd /path/to/MindGraph && python3 -m services.infrastructure.security.fail2ban_integration.report_ban 1.2.3.4
# Use your miniconda env Python, e.g.:
#   /bin/bash -c 'cd "/CHANGE/ME/MindGraph" && ~/miniconda3/envs/mindgraph/bin/python -m ...'

[Definition]
norestored = 1
actionstart =
actionstop =
actioncheck =
actionban = /bin/bash -c 'cd "/CHANGE/ME/MindGraph" && python3 -m services.infrastructure.security.fail2ban_integration.report_ban <ip>'
actionunban =

[Init]

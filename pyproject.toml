[tool.basedpyright]
include = ["**/*.py"]
exclude = [
    "**/__pycache__",
    "**/node_modules",
    "**/venv",
    "**/.venv",
    "**/dist",
    "**/build",
    "**/*.toml",
    "pyproject.toml",
]
stubPath = "typings"
# Miniconda env (conda activate python313 or mindgraph); .venv excluded from analysis
pythonVersion = "3.13"
typeCheckingMode = "basic"
reportMissingImports = "error"
reportUndefinedVariable = "error"
reportGeneralTypeIssues = "error"
reportPossiblyUnboundVariable = "error"
reportMissingTypeStubs = false
pythonPlatform = "Linux"
# Windows Cursor + WSL conda: basedpyright reads site-packages via UNC (adjust distro/user if needed).
# Prefer selecting the WSL interpreter in the IDE when possible:
#   \\wsl.localhost\Ubuntu-24.04\home\<user>\miniconda3\envs\python313\bin\python
extraPaths = [
    ".",
    "\\\\wsl.localhost\\Ubuntu-24.04\\home\\roywa\\miniconda3\\envs\\python313\\lib\\python3.13\\site-packages",
]

[tool.pylint.main]
# Ensure project root is in path for import resolution (fixes E1123 on agent_graph_workflow_with_styles)
init-hook = """
import sys
from pathlib import Path

def _mindgraph_project_root() -> Path:
    here = Path.cwd().resolve()
    for directory in (here, *here.parents):
        if (directory / "pyproject.toml").is_file() and (directory / "services").is_dir():
            return directory
    return here

_root = str(_mindgraph_project_root())
if _root not in sys.path:
    sys.path.insert(0, _root)
"""
# Exclude patterns (numeric Alembic revision filenames are not snake_case module names)
ignore-patterns = [
    "^venv/",
    "^.venv/",
    "^__pycache__/",
    "^node_modules/",
    "^dist/",
    "^build/",
    "^.*\\.toml$",
    "^pyproject\\.toml$",
    "^alembic/versions/",
    ".*/typings/",
]
# Pylint 3+: directory paths to skip (ensures migration files are not linted when ignore-patterns is ignored)
ignore-paths = [
    "alembic/versions",
    "frontend/node_modules",
    "typings",
    # Mostly long prompt strings; line length is enforced elsewhere (editors, ruff where applicable).
    "prompts",
    # @generated bundled API strings; wrapping would churn large dict literals on regen.
    "models/domain/message_catalog/bundled_messages.py",
]

# Output format
output-format = "text"

# Maximum line length
max-line-length = 120

# Disable checks that are structural / intentional for this codebase.
# Inline `# pylint: disable`, `# noqa`, and `# type: ignore` are forbidden —
# see scripts/lint/lint_no_inline_disables.py. Pattern-level exceptions live here only.
disable = [
    "too-few-public-methods",  # Common for data classes and utilities
    "duplicate-code",  # Large codebase shares similar patterns; refactor is tracked separately
    "arguments-renamed",  # Subclasses intentionally align API with different parameter names
]

[tool.pylint.format]
max-line-length = 120
indent-string = "    "

[tool.pylint.design]
# Typical modules: 600-800 lines; some generated or router modules are larger.
max-module-lines = 4000
# Thresholds aligned with real services (routers, LLM clients, error parsers, lifespan)
max-args = 35
max-locals = 120
max-branches = 250
max-statements = 500
max-attributes = 45
max-public-methods = 45
max-returns = 100
max-bool-expr = 10
max-nested-blocks = 15
max-parents = 15

[tool.pylint.basic]
# Good variable names regex
good-names = [
    "i",
    "j",
    "k",
    "ex",
    "Run",
    "_",
    "id",
    "db",
    "api",
    "url",
    "uid",
    "e",
    "x",
    "y",
    "z",
    "SessionLocal",
    "SyncSessionLocal",
    "AsyncSessionLocal",
    "_jwt_secret_cache",
    "_kitty_control_secret_cache",
    "AES",
    "LIBRARY_MODULE",
    "DEBATEVERSE_MODULE",
    "COMMUNITY_MODULE",
    "GEWE_MODULE",
    "WORKSHOP_CHAT_MODULE",
    "WORKSHOP_CHAT_WS_MODULE",
    "KNOWLEDGE_SPACE_MODULE",
    "MARKETS_MODULE",
    "MINDBOT_MODULE",
    "_embedding_client",
    "_embedding_service",
    "_tts_service",
    "_kb_rate_limiter",
    "_db_check_state_manager",
    "_integrity_check_lock_id",
    "_integrity_check_cache",
    "_load_balancer",
    "_keyword_search_service",
    "_activity_stream_service",
    "_city_flag_tracker",
    "_session_manager",
    "_registration_metrics",
    "_refresh_token_manager",
    "_api_key_cache",
    "_get_redis",
    "_is_redis_available",
    "_get_async_redis",
    "_redis_available",
    "_user_cache",
    "_dingtalk_session",
    "_outbound_session",
    "_shutting_down",
    "_client",
    # Alembic migration module attributes (required names; not UPPER_CASE)
    "revision",
    "down_revision",
    "branch_labels",
    "depends_on",
    # Optional-import fallback aliases (Rich, psutil, numpy, etc.)
    "Console",
    "Progress",
    "BarColumn",
    "SpinnerColumn",
    "TextColumn",
    "TimeElapsedColumn",
    "TimeRemainingColumn",
    "Rule",
    "Panel",
    "RICH_AVAILABLE",
    "_PSUTIL_AVAILABLE",
    "HAS_DATASETS",
    "HAS_NUMPY",
    "HAS_CHUNK_TEST_MODELS",
    "ChunkTestDocument",
    "ChunkTestDocumentChunk",
    "HAS_EMBEDDING",
    "HAS_SPACY",
    "HAS_CHONKIE",
    "HAS_LANGCHAIN",
    "HAS_LLM_CHUNKING",
    "TokenChunker",
    "RecursiveCharacterTextSplitter",
    "LLMSemanticChunker",
    "registration_metrics",
    # db_sessions module-level engine holders (mutated at startup)
    "engine",
    "async_engine",
]
# Allow UPPER_CASE for class attributes (constants)
class-attribute-rgx = "^[A-Z][A-Z0-9_]*$|^[a-z_][a-z0-9_]*$"
# Allow UPPER_CASE for attributes (properties that represent constants)
attr-rgx = "^[A-Z][A-Z0-9_]*$|^[a-z_][a-z0-9_]*$"
# Methods follow snake_case (3-31 chars). Names starting with ``test_`` may be
# longer (up to 80 chars after the prefix). AST visitors must use the
# ``visit_<NodeType>`` form mandated by ast.NodeVisitor.
method-rgx = "^(?:[a-z_][a-z0-9_]{2,40}|test_[a-z0-9_]{2,80}|visit_[A-Za-z][a-zA-Z0-9_]*|validate_[a-z0-9_]{2,80})$"

[tool.pylint.messages_control]
# Merged with [tool.pylint.main] disable list by pylint.
# Pattern-level policy (no inline disables — see lint_no_inline_disables.py):
# Four hardening rules enabled. Minimal permanent disables only (see plan).
disable = [
    "too-many-positional-arguments",  # Palette generators must match BasePaletteGenerator API
    "duplicate-code",
    "arguments-renamed",
    "too-few-public-methods",
]

[tool.pylint.typecheck]
# Optional/runtime deps not always installed in CI lint env.
# sqlalchemy uses heavy metaprogramming; func.* and mapped_column() members
# cannot be statically resolved by pylint.
ignored-modules = [
    "semchunk",
    "jieba3",
    "sqlalchemy",
    "alembic",
    "geoip2",
    "opencc",
    "orjson",
]

# Ruff: formatter + linter (closest to ESLint/Prettier for Python). Run: ruff format . && ruff check --fix .
[tool.ruff]
target-version = "py313"
line-length = 120
exclude = [
    "frontend",
    ".venv",
    "venv",
    "__pycache__",
    "node_modules",
]

[tool.ruff.lint]
# E402: imports after sys.path / env setup in scripts and some infra modules
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy relationship() forward refs (Mapped["User"], etc.)
"models/domain/**/*.py" = ["F821"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]